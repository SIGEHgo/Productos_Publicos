<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reconstrucción del Sistema Estatal de Biodiversidad</title>

    
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/> <!-- Leaflet -->

    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />          <!-- CSS de markercluster -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />  <!-- CSS de markercluster -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-minimap/dist/Control.MiniMap.min.css" />          <!-- MiniMap -->


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">   <!--Bootstrap -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet"> <!-- Font Awesome -->

    <link rel="stylesheet" href="code/styles.css">  <!-- Mi CSS -->
    <!-- <link rel="stylesheet" href="code/syles_media_query.css">  Media Query CSS -->

    <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">          <!-- Letra Monserrat -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>          <!-- Para leer archivos csv -->

</head>
<body>
    <header>
       Reconstrucción del Sistema Estatal de Biodiversidad
          <img src="Img/Logotipo_PLANEACION.png" style="width: 20%;">
          <img src="Img/Logotipo_COESBIOH.png" style="width: 13%;">
    </header>

<main>
    <nav class="sidebar collapsed d-flex flex-column flex-shrink-0 position-fixed">
        <!-- Botón de colapso -->
        <button class="toggle-btn" aria-label="Toggle sidebar" onclick="toggleSidebar()">
            <i class="fas fa-chevron-left"></i>
        </button>

        <!-- Links -->
        <div class="nav flex-column">
            <a href="#" class="sidebar-link active" data-seccion="mapa">
                <i class="fa-regular fa-map me-3"></i>
                <span class="hide-on-collapse">Mapa</span>
            </a>
            <div id="mapa-contenido" class="acordion" style="display: none;">
                <p>Interactuar con los diversos apartados</p>
            </div>

            <a href="#" class="sidebar-link" data-seccion="capas">
                <i class="fa-solid fa-layer-group me-3"></i>
                <span class="hide-on-collapse">Capas</span>
            </a>

            <div id="capas-contenido" class="acordion" style="display: none;">
                <p>Seleccione un reino:</p>
                <select name="reino" id="selector_reino"></select>

                <p>Seleccione un orden:</p>
                <select id="selector_orden" id="lista_orden"></select>

                <p>Seleccione la familia:</p>
                <select id="selector_familia" list="lista_familia"></select>

                <p>Seleccione por nombre científico:</p>
                <select id="selector_nombre" list="lista_nombre"></select>
            
            </div>

            <a href="#" class="sidebar-link" data-seccion="busqueda">
                <i class="fa-solid fa-magnifying-glass me-3"></i>
                <span class="hide-on-collapse">Búsqueda</span>
            </a>
            <div id="busqueda-contenido" class="acordion" style="display: none;">
                <p>Busque por nombre común.</p>
                <input id="buscador" list="lista" placeholder="Escriba el nombre común">
                <datalist id="lista"></datalist>
            </div>

            <a href="#" class="sidebar-link" id="btnInformacion" data-seccion="informacion">
                 <i class="fa-solid fa-circle-info me-3"></i>   <!-- fa-solid fa-circle-question me-3 -->
                <span class="hide-on-collapse">Información</span>
            </a>
            <div id="informacion-contenido" class="acordion" style="display: none;">
                <p>Información adicional sobre los datos.</p>
            </div>
        </div>
    </nav>



    <div class="mapa_interfaz">
        <div id="map"></div>
    </div>






</main>
    

<div id="contenedor-modales"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>  <!-- Leaflet JS -->
<script src = "https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>   <!-- Markercluster -->
<script src="code/JS/leaflet-heat.js"></script>
<script src="https://unpkg.com/leaflet-minimap/dist/Control.MiniMap.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>  <!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>  <!--Bootstrap JS -->

<script src="code/JS/datos.js"></script>
<script src="code/JS/diccionario.js"></script>
<script src="code/JS/hidalgo.js"></script>

<script src="code/JS/sidebar.js"></script>
<script src="code/JS/funciones_extras.js"></script>
<script src="code/JS/mapa.js"></script>

<script src="code/JS/popup.js"></script>

</body>
</html>
